openapi: 3.0.3
info:
  title: MaddnessEvent API
  description: API for managing Maddness events, ticket bookings, cart and merchandise orders.
  version: 1.0.0
servers:
  - url: http://localhost:3000/api
paths:
  /events:
    get:
      summary: List all events
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
    post:
      summary: Create an event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /events/{eventId}:
    parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: integer
    get:
      summary: Get event by ID
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Update event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventInput'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete event
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /tickets:
    post:
      summary: Book tickets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketRequest'
      responses:
        '201':
          description: Ticket booked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketBooking'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      summary: Get all bookings
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TicketBooking'
  /tickets/{bookingId}/download:
    parameters:
      - name: bookingId
        in: path
        required: true
        schema:
          type: integer
    get:
      summary: Download e-ticket
      responses:
        '200':
          description: E-ticket PDF
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /cart:
    get:
      summary: Get shopping cart
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
  /cart/items:
    post:
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItemInput'
      responses:
        '201':
          description: Added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /cart/items/{itemId}:
    parameters:
      - name: itemId
        in: path
        required: true
        schema:
          type: integer
    delete:
      summary: Remove item from cart
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /cart/checkout:
    post:
      summary: Checkout and pay
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /orders:
    get:
      summary: Get order history
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
  /orders/{orderId}:
    parameters:
      - name: orderId
        in: path
        required: true
        schema:
          type: integer
    get:
      summary: Get order by ID
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /products:
    get:
      summary: List all products
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
    post:
      summary: Add new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /products/{productId}:
    parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: integer
    get:
      summary: Get product by ID
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Update product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete product
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /djs:
    get:
      summary: List all DJs
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dj'
    post:
      summary: Add a new DJ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DjInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dj'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /djs/{djId}:
    parameters:
      - name: djId
        in: path
        required: true
        schema:
          type: integer
    get:
      summary: Get DJ by ID
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dj'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Update DJ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DjInput'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dj'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete DJ
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  schemas:
    Event:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        date:
          type: string
          format: date
        venue:
          type: string
        djs:
          type: array
          items:
            type: string
        price:
          type: number
          format: float
        capacity:
          type: integer
        availableTickets:
          type: integer
      required: [id, name, date, venue, price, capacity, availableTickets]
    EventInput:
      type: object
      properties:
        name:
          type: string
        date:
          type: string
          format: date
        venue:
          type: string
        djs:
          type: array
          items:
            type: string
        price:
          type: number
          format: float
        capacity:
          type: integer
      required: [name, date, venue, price, capacity]
    TicketRequest:
      type: object
      properties:
        eventId:
          type: integer
        quantity:
          type: integer
        purchaserName:
          type: string
      required: [eventId, quantity, purchaserName]
    TicketBooking:
      type: object
      properties:
        bookingId:
          type: integer
        eventId:
          type: integer
        quantity:
          type: integer
        purchaserName:
          type: string
        remainingTickets:
          type: integer
      required: [bookingId, eventId, quantity, purchaserName, remainingTickets]
    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: float
        stock:
          type: integer
        category:
          type: string
      required: [id, name, description, price, stock, category]
    ProductInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: float
        stock:
          type: integer
        category:
          type: string
      required: [name, description, price, stock, category]
    Dj:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        genre:
          type: string
        description:
          type: string
      required: [id, name, genre, description]
    DjInput:
      type: object
      properties:
        name:
          type: string
        genre:
          type: string
        description:
          type: string
      required: [name, genre, description]
    CartItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [product, event]
        quantity:
          type: integer
        price:
          type: number
          format: float
      required: [id, type, quantity, price]
    Cart:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        total:
          type: number
          format: float
      required: [items, total]
    CartItemInput:
      type: object
      properties:
        type:
          type: string
          enum: [product, event]
        id:
          type: integer
          description: Item ID for event or product based on type
        quantity:
          type: integer
      required: [type, id, quantity]
    CheckoutRequest:
      type: object
      properties:
        paymentMethod:
          type: string
      required: [paymentMethod]
    Order:
      type: object
      properties:
        orderId:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        total:
          type: number
          format: float
        paymentMethod:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [orderId, items, total, paymentMethod, status, createdAt]
    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
      required: [code, message]
